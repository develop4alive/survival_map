# Docker Compose - Survival Map v2
# Architecture: Parser with SQLite replica + PostgreSQL with PostGIS

# Shared logging config — json-file с ротацией (max 50MB на сервис: 5×10MB).
# Без этого docker накапливает логи без ограничений и съедает диск.
x-default-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

services:
  # =============================================================================
  # PostgreSQL - основной storage с PostGIS
  # =============================================================================
  postgres:
    image: survival_postgres:latest
    build:
      context: .
      dockerfile: Dockerfile.postgres
    container_name: postgres
    environment:
      # Захардкожено: postgres-контейнер изолирован от внешнего мира (нет
      # ports: блока, только expose внутри db-сети). Креды синхронизированы
      # с core/settings.py DatabaseConfig дефолтами.
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - db
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres && psql -U postgres -d postgres -c 'SELECT pg_is_in_recovery()' | grep -q 'f' && psql -U postgres -d postgres -c 'SELECT 1'"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 180s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    restart: unless-stopped
    logging: *default-logging

  # =============================================================================
  # Parser - Telegram парсер с in-memory кэшем
  # =============================================================================
  parser:
    image: survival_parser:latest
    build:
      context: .
      dockerfile: Dockerfile.parser
    container_name: parser
    environment:
      # Только credentials/per-deployment URL — всё остальное в core/settings.py.
      CHANNEL_ID: ${CHANNEL_ID}
      JWT_SECRET: ${JWT_SECRET}
    volumes:
      - ./parser/session.session:/app/parser/session.session:rw
      - events_media:/media/events:rw
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend
      - db
    healthcheck:
      # Свежесть heartbeat-файла: parser обновляет его каждую секунду в
      # keep-alive цикле. Stale-файл = event loop завис → unhealthy.
      # start_period 60s: PhoneticIndex build из ~1000 alias-фраз + PG connect.
      test: ["CMD-SHELL", "test -f /tmp/parser_heartbeat && [ $$(( $$(date +%s) - $$(cat /tmp/parser_heartbeat) )) -lt 60 ]"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1024M
        reservations:
          cpus: '0.5'
          memory: 512M
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: false
    tmpfs:
      - /tmp:noexec,nosuid,size=100m
    restart: unless-stopped
    logging: *default-logging

  # =============================================================================
  # Redis - кэш и очереди (опционально)
  # =============================================================================
  redis:
    image: redis:7-alpine
    container_name: redis
    # Захардкоженный пароль: redis-контейнер изолирован (нет ports: блока,
    # только internal-network). Синхронизирован с core/settings.py RedisConfig.
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru --requirepass redis
    volumes:
      - redis_data:/data
    networks:
      - backend
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
    restart: unless-stopped
    logging: *default-logging

  # =============================================================================
  # Core - API сервер (опционально)
  # =============================================================================
  core:
    image: survival_core:latest
    build:
      context: .
      dockerfile: Dockerfile.core
    container_name: core
    stop_grace_period: 30s
    environment:
      # Только credentials/per-deployment URL — всё остальное в core/settings.py.
      BOT_TOKEN: ${BOT_TOKEN}
      CHANNEL_ID: ${CHANNEL_ID}
      JWT_SECRET: ${JWT_SECRET}
      WEBAPP_URL: ${WEBAPP_URL:-}
      REDIRECT_URL: ${REDIRECT_URL:-}
      # Optional override: dev-режим без валидации Telegram InitData (default True).
      TELEGRAM_VALIDATION_ENABLED: ${TELEGRAM_VALIDATION_ENABLED:-True}
    volumes:
      - events_media:/media/events:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - frontend
      - backend
      - db
    expose:
      - "8080"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8080/health')\" || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    restart: unless-stopped
    logging: *default-logging

  # =============================================================================
  # Web - reverse proxy + статика фронтенда
  # =============================================================================
  web:
    image: survival_web:latest
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: web
    stop_grace_period: 30s
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - events_media:/media/events:ro
    depends_on:
      core:
        condition: service_healthy
    networks:
      - frontend
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/health/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
        reservations:
          cpus: '0.1'
          memory: 64M
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    # NET_BIND_SERVICE — для bind на 80, остальные drop'нуты.
    cap_add:
      - NET_BIND_SERVICE
      - CHOWN
      - SETGID
      - SETUID
      - DAC_OVERRIDE
    restart: unless-stopped
    logging: *default-logging

# =============================================================================
# Networks
# =============================================================================
networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge
  db:
    driver: bridge
    internal: true  # No external access

# =============================================================================
# Volumes
# =============================================================================
volumes:
  postgres_data:
    driver: local
  events_media:
    driver: local
  redis_data:
    driver: local

user nginx;
worker_shutdown_timeout 15s;

events {
    worker_connections 512;  # Оптимизировано: достаточно для текущей нагрузки
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Определение upstream для приложения
    upstream core {
        server core:8080;
    }

    # Отключаем избыточное логирование запросов
    access_log off;
    # Логируем только ошибки
    error_log /var/log/nginx/error.log warn;

    # Gzip сжатие для лучшей производительности
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript
               application/json application/javascript application/xml+rss
               application/rss+xml font/truetype font/opentype
               application/vnd.ms-fontobject image/svg+xml;
    gzip_disable "msie6";
    gzip_min_length 256;

    # Основные настройки для проксирования
    proxy_connect_timeout 60;
    proxy_send_timeout 60;
    proxy_read_timeout 60;
    proxy_buffer_size 4k;
    proxy_buffers 8 16k;
    proxy_busy_buffers_size 64k;
    proxy_temp_file_write_size 64k;

    server {
        listen 80;
        # HTTP/2 включается nginx-ом при ALPN-handshake (только за HTTPS-frontend
        # типа ngrok / Cloudflare / Traefik с TLS terminator). Локально и поверх
        # plain HTTP работает HTTP/1.1. nginx >= 1.25 предпочитает директиву
        # http2 on; на server-уровне.
        http2 on;

        server_name _;

        # Настройка корневой директории
        root /usr/share/nginx/html;
        index index.html;

        # Защищенная страница map - требует JWT проверки через backend
        # В production: /map проксируется на backend для проверки токена
        # Для простоты: используем client-side редирект в map.html

        # Главная страница (gate) - всегда доступна
        location = / {
            try_files /index.html =404;
            add_header Cache-Control "no-cache, must-revalidate";
        }

        # Gate страница
        location = /index.html {
            try_files /index.html =404;
            add_header Cache-Control "no-cache, must-revalidate";
            add_header X-Frame-Options "DENY";
            add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://telegram.org; style-src 'self' 'unsafe-inline';";
        }

        # Map страница - client-side защита через JWT
        location = /map.html {
            try_files /map.html =404;
            add_header Cache-Control "no-cache, must-revalidate";
            add_header X-Frame-Options "SAMEORIGIN";
            # CSP для Mini App: разрешён Telegram SDK + WebSocket + tile hosts.
            # unsafe-inline для style нужен MapLibre runtime styles (НЕ для script:
            # inline-скриптов на странице нет, поэтому script-src строгий). img-src
            # data: для MapLibre cluster icons inline. connect-src tiles.openfreemap.org
            # — maplibre fetch'ит style-JSON и .pbf векторные тайлы по https.
            add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://telegram.org; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; connect-src 'self' wss: ws: https://tiles.openfreemap.org; font-src 'self' data:; worker-src 'self' blob:; frame-ancestors 'self';";
            add_header X-Content-Type-Options "nosniff";
            add_header Referrer-Policy "strict-origin-when-cross-origin";
        }

        # Алиас /map на map.html
        location = /map {
            try_files /map.html =404;
        }

        # Удален блок location /tiles/, так как перешли на OpenStreetMap и больше не нужно проксирование

        # Обработка favicon.ico - возвращаем 204 без логирования ошибок
        location = /favicon.ico {
            log_not_found off;
            access_log off;
            return 204;
        }

        # Редирект для старых страниц /pages/ на главную
        location ^~ /pages/ {
            return 301 /;
        }

        # Также редиректим конкретно 404.html
        location = /pages/404.html {
            return 301 /;
        }

        # Compatibility health endpoint under /api prefix
        # Backend health endpoints are served at /health/* (no /api prefix)
        location = /api/health/ready {
            proxy_pass http://core/health/ready;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Application health endpoints - proxy to core container
        location /health {
            proxy_pass http://core/health;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 5s;
            proxy_read_timeout 5s;
        }

        location /api/ {
            # CORS намеренно не отдаётся: фронтенд обслуживается этим же nginx
            # (same-origin), кросс-доменные обращения к API не разрешены.
            # Preflight отвечаем дёшево, без Access-Control-* заголовков.
            if ($request_method = 'OPTIONS') {
                return 204;
            }

            # Настройки для обработки ошибок upstream
            proxy_next_upstream error timeout invalid_header http_500 http_502 http_503 http_504;
            proxy_next_upstream_tries 2;
            proxy_next_upstream_timeout 10s;

            proxy_pass http://core;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Увеличиваем таймауты для стабильности
            proxy_connect_timeout 10s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;

            add_header Vary "Accept-Encoding";
        }

        # WebSocket location
        location /ws {
            proxy_pass http://core;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Таймаут чтения > интервала heartbeat (30s в коде) с запасом
            proxy_connect_timeout 75s;
            proxy_send_timeout 1h;
            proxy_read_timeout 1h;
        }

        location /data/ {
            alias /usr/share/nginx/html/data/;
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
            add_header Pragma "no-cache";
            add_header Expires "0";
        }

        # Direct static file access from Docker volume
        location ~ ^/media/events/(?<filename>[^/]+\.jpg)$ {
            alias /media/events/$filename;
            expires 30d;
            add_header Cache-Control "public, immutable";
            access_log off;
            etag on;

            # Security headers
            add_header X-Content-Type-Options "nosniff";
            add_header X-Frame-Options "SAMEORIGIN";

            # Fallback to API if file not found on volume
            try_files /media/events/$filename @api_fallback;
        }
        
        location @api_fallback {
            proxy_pass http://core/api/media/events/$filename;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            expires 30d;
            add_header Cache-Control "public, immutable";
            access_log off;
            etag on;
        }

        # Legacy path alias for backward compatibility
        location ~ ^/assets/images/events/(?<filename>[^/]+\.jpg)$ {
            proxy_pass http://core/api/media/events/$filename;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            expires 30d;
            add_header Cache-Control "public, immutable";
            access_log off;
            etag on;
        }

        # Bootstrap scripts externalized from index.html/map.html (strict CSP).
        # Non-cacheable like the HTML they replace — avoids a stale gate after
        # deploys. ^~ wins over the generic `~* \.js$` (which sets expires 7d).
        location ^~ /assets/js/ {
            root /usr/share/nginx/html;
            try_files $uri =404;
            expires off;
            add_header Cache-Control "no-cache";
            add_header X-Content-Type-Options "nosniff";
        }

        # Application JS (our code) — reliable approach for Telegram WebView
        # Handle versioned URLs with a simple and robust pattern
        # Use ^~ so this prefix location wins over the generic regex location ~ \.js$
        location ^~ /js/ {
            # Handle versioned URLs by extracting the real file path
            # Order is important - more specific patterns first, more general later
            # This prevents conflicts and infinite loops

            # Handle nested versioned imports: /js/core/data.js/__v__/ui.js/modules/notifications.js/__v__/TOKEN -> /js/modules/notifications.js
            rewrite ^(/js/)[^/]+/[^/]+\.js/__v__/[^/]+\.js/modules/([^/]+\.js)/__v__/[^/]+$ $1modules/$2 break;
            # Handle nested versioned imports: /js/core/data.js/__v__/ui.js/utils.js/__v__/TOKEN -> /js/utils.js
            rewrite ^(/js/)[^/]+/[^/]+\.js/__v__/[^/]+\.js/([^/]+\.js)/__v__/[^/]+$ $1$2 break;
            # Handle nested imports: /js/core/data.js/__v__/map.js/ui.js/__v__/TOKEN -> /js/core/ui.js
            rewrite ^(/js/.*/)[^/]+\.js/([^/]+\.js)/__v__/([^/]+\.js)/__v__/[^/]+$ $1$3 break;
            # Handle nested imports: /js/core/data.js/__v__/map.js/__v__/TOKEN -> /js/core/map.js
            rewrite ^(/js/.*/)[^/]+\.js/__v__/([^/]+\.js)/__v__/[^/]+$ $1$2 break;
            # Handle relative imports: /js/core/data.js/modules/notifications.js/__v__/TOKEN -> /js/modules/notifications.js
            rewrite ^(/js/)[^/]+/[^/]+\.js/modules/([^/]+\.js)/__v__/[^/]+$ $1modules/$2 break;
            # Handle relative imports: /js/core/data.js/utils.js/__v__/TOKEN -> /js/utils.js
            rewrite ^(/js/)[^/]+/[^/]+\.js/([^/]+\.js)/__v__/[^/]+$ $1$2 break;
            # Handle simple versioned URLs: /js/foo.js/__v__/TOKEN -> /js/foo.js
            rewrite ^(/js/.+\.js)/__v__/[^/]+$ $1 break;

            root /usr/share/nginx/html;
            try_files $uri =404;
            expires off;
            add_header Cache-Control "no-cache, must-revalidate";
            add_header Pragma "no-cache";
            add_header X-Content-Type-Options "nosniff";
            etag on;
            add_header Vary "Accept-Encoding";
        }

        # Compiled TypeScript files from webpack
        location ^~ /dist/ {
            root /usr/share/nginx/html;
            try_files $uri =404;
            
            # Указываем правильный MIME тип для JavaScript файлов
            location ~* \.js$ {
                add_header Content-Type application/javascript;
                expires 7d;
                add_header Cache-Control "public, immutable";
                add_header X-Content-Type-Options "nosniff";
                etag on;
                add_header Vary "Accept-Encoding";
            }
            
            expires 7d;
            add_header Cache-Control "public, immutable";
            add_header X-Content-Type-Options "nosniff";
            etag on;
            add_header Vary "Accept-Encoding";
        }

        # JS файлы - умеренное кэширование с версионированием
        location ~* \.js$ {
            try_files $uri =404;
            expires 7d;
            add_header Cache-Control "public, immutable";
            add_header X-Content-Type-Options "nosniff";
            etag on;
            # Дополнительная оптимизация для JS
            add_header Vary "Accept-Encoding";
        }

        # CSS файлы - долгое кэширование
        location ~* \.css$ {
            try_files $uri =404;
            expires 30d;
            add_header Cache-Control "public, immutable";
            add_header X-Content-Type-Options "nosniff";
            etag on;
            # Дополнительная оптимизация для CSS
            add_header Vary "Accept-Encoding";
        }

        # Изображения и медиа - очень долгое кэширование
        location ~* \.(gif|jpg|jpeg|png|svg|webp|ico|woff|woff2|ttf|eot)$ {
            try_files $uri =404;
            expires 365d;
            add_header Cache-Control "public, immutable";
            access_log off;
            etag on;
            # Добавляем CORS заголовки для поддержки разных доменов
            add_header Access-Control-Allow-Origin *;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS";
            add_header Access-Control-Allow-Headers "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range";
            # Разрешаем запросы с любых источников (важно для ngrok)
            add_header X-Frame-Options "SAMEORIGIN";
            add_header X-Content-Type-Options "nosniff";
            # Дополнительная оптимизация
            add_header Vary "Accept-Encoding";
        }

        # HTML файлы - минимальное кэширование
        location ~* \.html$ {
            try_files $uri =404;
            expires off;
            add_header Cache-Control "no-cache, must-revalidate";
            etag on;
        }

        # Service Worker — no-cache so updates propagate immediately.
        location = /sw.js {
            try_files /sw.js =404;
            expires off;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            add_header X-Content-Type-Options "nosniff";
            etag on;
        }

        # PWA manifest — .webmanifest is not in nginx mime.types, set it here.
        location = /manifest.webmanifest {
            try_files /manifest.webmanifest =404;
            default_type application/manifest+json;
            expires 1h;
            add_header Cache-Control "public, must-revalidate";
            add_header X-Content-Type-Options "nosniff";
            etag on;
        }

        # 404 -> redirect to gate page
        error_page 404 =200 /index.html;
    }
}
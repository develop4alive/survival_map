<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#ffffff" id="theme-color-meta">
    <meta name="color-scheme" content="light dark">
    <title>survival_map</title>

    <!-- Icons + PWA manifest -->
    <link rel="icon" href="data:,">
    <link rel="apple-touch-icon" href="/assets/images/pig.png">
    <link rel="manifest" href="/manifest.webmanifest">

    <!-- Stylesheets -->
    <link rel="stylesheet" href="/assets/lib/leaflet.css"/>
    <link rel="stylesheet" href="/assets/lib/MarkerCluster.css" />
    <link rel="stylesheet" href="/assets/lib/MarkerCluster.Default.css" />
    <link href="/assets/lib/maplibre-gl.css" rel="stylesheet" />
    <link rel="stylesheet" href="css/styles.css">

    <!-- Telegram Web App -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <!-- Synchronous setup (auth headers, default config, user info) —
         externalized to satisfy strict CSP (script-src 'self'). -->
    <script src="/assets/js/map-setup.js"></script>

</head>
<body>
    <div id="map"></div>
    <div id="errorMessage">Ошибка: Не удалось загрузить данные.</div>
    <div id="centerPopupOverlay"></div>
    <div id="centerPopup">
        <span class="close-btn" id="closeCenterPopup">×</span>
        <div id="centerPopupContent"></div>
    </div>

    <!-- Connection status indicator -->
    <div id="connection-indicator" style="display: none; position: absolute; top: 10px; left: 50%; transform: translateX(-50%); background: #f44336; color: white; padding: 8px 16px; border-radius: 4px; z-index: 1000; font-size: 14px;">
        ⚠️ Нет связи с сервером
    </div>


    <div id="legendBtn" title="Легенда" style="position: absolute; top: 20px; right: 20px; z-index: 1000; cursor: pointer;">
        <img src="/assets/images/legend-info.svg" class="interaction-icon" style="width: 24px; height: 24px;" alt="Легенда">
    </div>

    <div id="dayNightBtn" title="День/Ночь" style="position: absolute; top: 50px; right: 20px; z-index: 1000; cursor: pointer;">
        <img id="dayNightIcon" src="/assets/images/daynight.svg" class="interaction-icon" style="width: 24px; height: 24px;" alt="День/Ночь">
    </div>

    <div id="controlsContainer">
        <div id="controlsSlider">
            <!-- Первый слайд: фильтр времени -->
            <div id="realtimeControls" class="controlPanel">
                <div class="centered-content">
                    <p>Отображать события за:</p>
                    <div class="buttons">
                        <button data-minutes="15">15 минут</button>
                        <button data-minutes="30">30 минут</button>
                        <button data-minutes="60">1 час</button>
                    </div>
                </div>
            </div>
            <!-- Второй слайд: чекбоксы слоёв -->
            <div id="layerControls" class="controlPanel">
                <div class="layers">
                    <label>
                        <img src="/assets/images/bus.png" alt="Бус">
                        <input type="checkbox" data-layer="bus" checked>
                    </label>
                    <label>
                        <img src="/assets/images/cops.png" alt="Менты">
                        <input type="checkbox" data-layer="cops" checked>
                    </label>
                    <label>
                        <span class="emoji-icon" aria-label="Трафик">⛔</span>
                        <input type="checkbox" data-layer="traffic" checked>
                    </label>
                    <label>
                        <img src="/assets/images/pig.png" alt="Остальное">
                        <input type="checkbox" data-layer="pig" checked>
                    </label>
                </div>
            </div>
        </div>
        <div id="controlsIndicators">
            <div class="dot active"></div>
            <div class="dot"></div>
        </div>
    </div>

    <script src="/assets/lib/leaflet.js"></script>
    <script src="/assets/lib/leaflet.markercluster.js"></script>
    <script src="/assets/lib/maplibre-gl.js"></script>
    <script src="/assets/lib/maplibre-gl-leaflet.js"></script>

    <!-- Hard validation gate + bootstrap — externalized to satisfy strict CSP
         (script-src 'self'). Runs after the leaflet/maplibre libs above. -->
    <script src="/assets/js/map-bootstrap.js"></script>
</body>
</html>

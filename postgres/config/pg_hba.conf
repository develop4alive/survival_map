# pg_hba.conf - Контроль доступа к PostgreSQL

# TYPE  DATABASE        USER            ADDRESS                 METHOD

# Локальные подключения через Unix-сокет
local   all             postgres                                trust
local   all             all                                     peer

# TCP/IP подключения из Docker-сети (только с паролем)
host    all             all             0.0.0.0/0               scram-sha-256
host    all             all             ::/0                    scram-sha-256

# Специальные правила для пользователей
# app_user может подключаться только к базе postgres
host    postgres        app_user        172.0.0.0/8             scram-sha-256
host    postgres        app_user        10.0.0.0/8              scram-sha-256
host    postgres        app_user        192.168.0.0/16          scram-sha-256

# ws_user может подключаться только к базе postgres
host    postgres        ws_user         172.0.0.0/8             scram-sha-256
host    postgres        ws_user         10.0.0.0/8              scram-sha-256
host    postgres        ws_user         192.168.0.0/16          scram-sha-256

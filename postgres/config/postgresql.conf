# PostgreSQL Configuration

# Required libraries.
# - pg_cron — расписание задач (auto-prune старых events, см. init-scripts)
# - pg_stat_statements — топ-N slow queries для perf-аудита
#   (просмотр: `SELECT * FROM pg_stat_statements ORDER BY total_exec_time DESC LIMIT 20;`)
shared_preload_libraries = 'pg_cron,pg_stat_statements'

# Network
listen_addresses = '*'
port = 5432
max_connections = 100

# Logging - errors only
log_min_messages = warning
log_line_prefix = '%m [%p] '
log_statement = 'none'
# Логировать SQL дольше 1с — для дебага slow queries без шума
log_min_duration_statement = 1000

# Memory — согласовано с docker-compose limits.
# Если в compose limit ≥ 1GB, можно увеличить shared_buffers до 384MB и
# effective_cache_size до 768MB. Сейчас limits в compose не заданы для
# postgres, но рекомендуется ≥ 512MB.
shared_buffers = 256MB
effective_cache_size = 384MB
work_mem = 4MB
maintenance_work_mem = 64MB

# Autovacuum tuning — events table high-churn (60-min TTL + новые INSERTs)
# Дефолтные 20% scale_factor означают что vacuum срабатывает только при росте
# таблицы на 20% — для high-churn это редко. Снижаем до 5%.
autovacuum = on
autovacuum_naptime = 30s
autovacuum_vacuum_scale_factor = 0.05
autovacuum_analyze_scale_factor = 0.02
autovacuum_vacuum_cost_delay = 10ms

# pg_stat_statements settings
pg_stat_statements.max = 5000
pg_stat_statements.track = all
pg_stat_statements.save = on

# Timezone
timezone = 'UTC'
